<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; fill: #1a1a1a; }
      .th  { font-size: 14px; font-weight: 600; }
      .ts  { font-size: 12px; font-weight: 400; fill: #444; }
      .kpi-teal  { fill: #E1F5EE; stroke: #0F6E56; }
      .kpi-blue  { fill: #E6F1FB; stroke: #185FA5; }
      .kpi-amber { fill: #FAEEDA; stroke: #854F0B; }
      .kpi-purple{ fill: #EEEDFE; stroke: #534AB7; }
      .kpi-coral { fill: #FAECE7; stroke: #993C1D; }
      .kpi-green { fill: #EAF3DE; stroke: #3B6D11; }
      .kpi-gray  { fill: #F1EFE8; stroke: #5F5E5A; }
      .bar-green { fill: #1D9E75; }
      .bar-gray  { fill: #D3D1C7; }
      .bar-teal  { fill: #1D9E75; opacity: 0.8; }
      .bar-amber { fill: #EF9F27; opacity: 0.8; }
      .bar-coral { fill: #D85A30; opacity: 0.85; }
      .bar-red   { fill: #A32D2D; opacity: 0.9; }
      rect { rx: 8; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="620" fill="#ffffff" rx="12"/>

  <!-- ── KPI Row ── -->
  <rect x="20" y="16" width="148" height="72" rx="8" class="kpi-teal" stroke-width="0.8"/>
  <text class="th" x="94" y="48" text-anchor="middle">$15.7M</text>
  <text class="ts" x="94" y="70" text-anchor="middle">total revenue</text>

  <rect x="178" y="16" width="148" height="72" rx="8" class="kpi-blue" stroke-width="0.8"/>
  <text class="th" x="252" y="48" text-anchor="middle">98,199</text>
  <text class="ts" x="252" y="70" text-anchor="middle">total orders</text>

  <rect x="336" y="16" width="148" height="72" rx="8" class="kpi-amber" stroke-width="0.8"/>
  <text class="th" x="410" y="48" text-anchor="middle">$140.37</text>
  <text class="ts" x="410" y="70" text-anchor="middle">avg order value</text>

  <rect x="494" y="16" width="166" height="72" rx="8" class="kpi-purple" stroke-width="0.8"/>
  <text class="th" x="577" y="44" text-anchor="middle">2 years</text>
  <text class="ts" x="577" y="64" text-anchor="middle">Sep 2016 → Sep 2018</text>

  <!-- ── Pareto Section ── -->
  <text class="th" x="340" y="118" text-anchor="middle">Pareto finding — 23.6% of categories drive 80% of revenue</text>

  <rect x="20" y="130" width="383" height="34" rx="4" class="bar-green"/>
  <text class="ts" x="30" y="152" dominant-baseline="central" fill="#04342C">17 categories (23.6%) → 80% of revenue</text>

  <rect x="403" y="130" width="257" height="34" rx="4" class="bar-gray"/>
  <text class="ts" x="413" y="152" dominant-baseline="central" fill="#2C2C2A">55 categories → 20%</text>

  <text class="ts" x="340" y="182" text-anchor="middle">Business insight: focus marketing and inventory on just 17 categories</text>

  <!-- ── Delivery vs Review Section ── -->
  <text class="th" x="340" y="214" text-anchor="middle">Late delivery destroys customer satisfaction</text>

  <text class="ts" x="20" y="236" dominant-baseline="central">On time</text>
  <rect x="110" y="224" width="430" height="24" rx="4" class="bar-teal"/>
  <text class="ts" x="548" y="236" dominant-baseline="central">4.29 stars · 9% bad</text>

  <text class="ts" x="20" y="268" dominant-baseline="central">1-3 days late</text>
  <rect x="110" y="256" width="315" height="24" rx="4" class="bar-amber"/>
  <text class="ts" x="433" y="268" dominant-baseline="central">3.29 stars · 32% bad</text>

  <text class="ts" x="20" y="300" dominant-baseline="central">4-7 days late</text>
  <rect x="110" y="288" width="200" height="24" rx="4" class="bar-coral"/>
  <text class="ts" x="318" y="300" dominant-baseline="central">2.10 stars · 67% bad</text>

  <text class="ts" x="20" y="332" dominant-baseline="central">7+ days late</text>
  <rect x="110" y="320" width="163" height="24" rx="4" class="bar-red"/>
  <text class="ts" x="281" y="332" dominant-baseline="central">1.70 stars · 79% bad</text>

  <line x1="420" y1="240" x2="420" y2="268" stroke="#D85A30" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text class="ts" x="426" y="254">review drops 1 full star</text>
  <text class="ts" x="426" y="270">after just 3 days late</text>

  <!-- ── Insight boxes ── -->
  <text class="th" x="340" y="372" text-anchor="middle">Key business insights</text>

  <rect x="20" y="384" width="198" height="70" rx="8" class="kpi-teal" stroke-width="0.8"/>
  <text class="th" x="119" y="408" text-anchor="middle">Insight 1</text>
  <text class="ts" x="119" y="428" text-anchor="middle">17 categories = 80%</text>
  <text class="ts" x="119" y="444" text-anchor="middle">of all revenue</text>

  <rect x="241" y="384" width="198" height="70" rx="8" class="kpi-coral" stroke-width="0.8"/>
  <text class="th" x="340" y="408" text-anchor="middle">Insight 2</text>
  <text class="ts" x="340" y="428" text-anchor="middle">1-3 day delay = review</text>
  <text class="ts" x="340" y="444" text-anchor="middle">drops by 1 full star</text>

  <rect x="462" y="384" width="198" height="70" rx="8" class="kpi-purple" stroke-width="0.8"/>
  <text class="th" x="561" y="408" text-anchor="middle">Insight 3</text>
  <text class="ts" x="561" y="428" text-anchor="middle">7+ days late → 79%</text>
  <text class="ts" x="561" y="444" text-anchor="middle">chance of bad review</text>

  <!-- Divider -->
  <line x1="20" y1="472" x2="660" y2="472" stroke="#ccc" stroke-width="0.8" stroke-dasharray="4 3"/>

  <!-- Interview framing -->
  <text class="th" x="340" y="496" text-anchor="middle">How to present this in an interview</text>

  <rect x="20" y="508" width="640" height="36" rx="6" class="kpi-gray" stroke-width="0.8"/>
  <text class="ts" x="340" y="530" text-anchor="middle" dominant-baseline="central">"I found that a 1-3 day delivery delay reduces avg review score by 23% — from 4.29 to 3.29 stars"</text>

  <rect x="20" y="552" width="640" height="36" rx="6" class="kpi-gray" stroke-width="0.8"/>
  <text class="ts" x="340" y="574" text-anchor="middle" dominant-baseline="central">"Only 17 of 72 product categories generate 80% of revenue — strong case for portfolio consolidation"</text>

  <!-- Footer -->
  <text class="ts" x="340" y="610" text-anchor="middle" fill="#888">Olist E-Commerce Intelligence Project · Phase 3 · SQL Business Analysis</text>
</svg>
